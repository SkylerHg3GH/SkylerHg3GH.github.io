<!DOCTYPE html>
<html>

<head>
    <style>
        p {
            color: azure;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif
        }

        h1 {
            color: azure;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif
        }

        h3 {
            color: azure;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif
        }
    </style>
</head>

<body style="background-color: #383838;">
    <h1> Coinflip </h1>
    <p> A very good coinflip in the browser !</p>
    <p>
        You landed:
        <span id="coinflipresult"><b>(Coinflip first)</span>
    </p>
    <script>
        function coinflip() {
            const coinflipElement = document.getElementById("coinflipresult")
            let coinflipResult = "heads" ? Math.round(Math.random()) == 0 : "tails"
            coinflipElement.textContent = coinflipResult
        }
    </script>
    <button onclick="
            coinflip()
        " style="background-color: azure; border-radius: 100px; font-size: 25px">Coinflip</button>
</body>

</html>
